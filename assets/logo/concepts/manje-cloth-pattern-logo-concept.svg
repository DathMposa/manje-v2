<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Manje logo concept inspired by mascot clothing pattern">
  <defs>
    <linearGradient id="greenRibbon" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A6B4A"/>
      <stop offset="1" stop-color="#0D3B2E"/>
    </linearGradient>
    <linearGradient id="goldRibbon" x1="120" y1="260" x2="300" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B07D08"/>
      <stop offset="0.55" stop-color="#F5C518"/>
      <stop offset="1" stop-color="#FFE566"/>
    </linearGradient>
    <style>
      .h1 { font: 850 46px Inter, Arial, sans-serif; fill: #0D3B2E; }
      .body { font: 500 20px Inter, Arial, sans-serif; fill: #426356; }
      .label { font: 750 24px Inter, Arial, sans-serif; fill: #0D3B2E; }
      .word { font: 850 132px Inter, Arial, sans-serif; fill: #0D3B2E; letter-spacing: -5px; }
      .tag { font: 750 17px Inter, Arial, sans-serif; fill: #1A6B4A; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#F8FAF9"/>
  <text x="80" y="96" class="h1">Manje Cloth-Pattern Logo Concept</text>
  <text x="82" y="132" class="body">Inspired by the small green-and-gold badge/detail on the mascot outfit: a woven ribbon M, premium and icon-ready.</text>

  <g transform="translate(100 190)">
    <rect width="1400" height="430" rx="38" fill="#FFFFFF" stroke="#DDE7E2" stroke-width="2"/>
    <text x="56" y="64" class="label">Primary logo</text>
    <text x="56" y="98" class="body">The mark feels like tailored fabric/ribbon, linking the brand back to the mascot without using the mascot itself.</text>

    <g transform="translate(185 140)">
      <rect width="240" height="240" rx="58" fill="#F8FAF9"/>
      <path d="M58 184V62c0-16 11-28 27-28s27 12 27 28v72l42-78c6-11 15-17 26-17s20 6 26 17l42 78V62c0-16 11-28 27-28s27 12 27 28v122c0 16-11 28-27 28s-27-12-27-28v-44l-40 72c-6 10-14 15-26 15s-20-5-26-15l-40-72v44c0 16-11 28-27 28s-27-12-27-28z" fill="url(#greenRibbon)"/>
      <path d="M82 170L156 76c8-10 20-10 28 0l74 94" fill="none" stroke="#F8FAF9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <path d="M86 174l70-89c7-9 17-9 24 0l70 89" fill="none" stroke="url(#goldRibbon)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M93 49h42" stroke="#B07D08" stroke-width="10" stroke-linecap="round"/>
      <path d="M225 49h42" stroke="#F5C518" stroke-width="10" stroke-linecap="round"/>
    </g>

    <text x="505" y="290" class="word">Manje</text>
    <text x="513" y="344" class="tag">SPEND CLEARLY. SAVE CONFIDENTLY.</text>
  </g>

  <g transform="translate(100 680)">
    <rect width="430" height="190" rx="34" fill="#FFFFFF" stroke="#DDE7E2" stroke-width="2"/>
    <text x="36" y="54" class="label">App icon</text>
    <g transform="translate(262 48) scale(0.46)">
      <rect width="240" height="240" rx="58" fill="#F8FAF9"/>
      <path d="M58 184V62c0-16 11-28 27-28s27 12 27 28v72l42-78c6-11 15-17 26-17s20 6 26 17l42 78V62c0-16 11-28 27-28s27 12 27 28v122c0 16-11 28-27 28s-27-12-27-28v-44l-40 72c-6 10-14 15-26 15s-20-5-26-15l-40-72v44c0 16-11 28-27 28s-27-12-27-28z" fill="url(#greenRibbon)"/>
      <path d="M82 170L156 76c8-10 20-10 28 0l74 94" fill="none" stroke="#F8FAF9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <path d="M86 174l70-89c7-9 17-9 24 0l70 89" fill="none" stroke="url(#goldRibbon)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M93 49h42" stroke="#B07D08" stroke-width="10" stroke-linecap="round"/>
      <path d="M225 49h42" stroke="#F5C518" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(590 680)">
    <rect width="430" height="190" rx="34" fill="#FFFFFF" stroke="#DDE7E2" stroke-width="2"/>
    <text x="36" y="54" class="label">Wordmark only</text>
    <text x="36" y="128" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="850" fill="#0D3B2E" letter-spacing="-2">Manje</text>
  </g>

  <g transform="translate(1080 680)">
    <rect width="420" height="190" rx="34" fill="#FFFFFF" stroke="#DDE7E2" stroke-width="2"/>
    <text x="36" y="54" class="label">Why it works</text>
    <text x="36" y="92" class="body">Connected to the mascot outfit.</text>
    <text x="36" y="124" class="body">Abstract enough to feel premium.</text>
    <text x="36" y="156" class="body">No forced mascot or chart symbol.</text>
  </g>
</svg>
