<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&amp;display=swap');
    </style>

    <radialGradient id="goldFace" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="45%"  stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#B07D08"/>
    </radialGradient>

    <radialGradient id="goldRim" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#D4A820"/>
      <stop offset="100%" stop-color="#7A5200"/>
    </radialGradient>

    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5"
                    flood-color="#5A3A00" flood-opacity="0.45"/>
    </filter>

    <filter id="sparkleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="coinClip">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
  </defs>

  <!-- ── COIN RIM ────────────────────────────────────────────── -->
  <circle cx="50" cy="50" r="44"
          fill="url(#goldRim)"
          filter="url(#coinShadow)"/>

  <!-- ── COIN FACE ───────────────────────────────────────────── -->
  <circle cx="50" cy="50" r="40"
          fill="url(#goldFace)"/>

  <!-- Claymorphic highlight -->
  <ellipse cx="37" cy="30" rx="14" ry="9"
           fill="rgba(255,255,220,0.35)"
           clip-path="url(#coinClip)"/>

  <!-- Inner engraving ring -->
  <circle cx="50" cy="50" r="36"
          fill="none"
          stroke="rgba(140,90,0,0.25)"
          stroke-width="1.2"/>

  <!-- ── M LETTERFORM ─────────────────────────────────────────── -->
  <g clip-path="url(#coinClip)">
    <path d="M20,76 L20,34 L50,56 L80,34 L80,76"
          stroke="white" stroke-width="8.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"
          opacity="0.95"/>
  </g>

  <!-- ── SPARKLE ──────────────────────────────────────────────── -->
  <g filter="url(#sparkleGlow)">
    <path d="M50,4 L51.6,10.5 L58,12 L51.6,13.5 L50,20 L48.4,13.5 L42,12 L48.4,10.5 Z"
          fill="white" opacity="0.98"/>
    <circle cx="61" cy="9"  r="1.4" fill="white" opacity="0.7"/>
    <circle cx="39" cy="9"  r="1.4" fill="white" opacity="0.7"/>
    <circle cx="65" cy="16" r="0.9" fill="white" opacity="0.45"/>
    <circle cx="35" cy="16" r="0.9" fill="white" opacity="0.45"/>
  </g>

  <!-- ── WORDMARK ─────────────────────────────────────────────── -->
  <!-- "Ma" regular · "nje" bold in deep gold to match coin -->
  <text x="110" y="66"
        font-size="40"
        font-family="'Syne', 'Helvetica Neue', Arial, sans-serif"
        letter-spacing="-0.5">
    <tspan font-weight="400" fill="#1A1A1A">Ma</tspan><tspan font-weight="700" fill="#B07D08">nje</tspan>
  </text>
</svg>
