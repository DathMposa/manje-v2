name: Manje Mobile CI

on:
  push:
    paths:
      - 'manje-mobile/**'
      - '.github/workflows/manje-mobile-ci.yml'
  pull_request:
    paths:
      - 'manje-mobile/**'
      - '.github/workflows/manje-mobile-ci.yml'

jobs:
  typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: manje-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: manje-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
